    <meta name="mobile-web-app-capable" content="yes" />

    <!-- DNS Prefetch & Preconnect for speed -->
    <link rel="dns-prefetch" href="https://umhqbgsvfjatcaiwtqnr.supabase.co" />
    <link rel="preconnect" href="https://umhqbgsvfjatcaiwtqnr.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical font -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>SnyX-Cluad</title>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SnyX",
      "description": "Plataforma de IA com chat inteligente, geração de código e música",
      "applicationCategory": "Utility",
      "operatingSystem": "Web",
      "inLanguage": "pt-BR"
    }
    </script>

    <!-- Instant page: prefetch on hover -->
    <script type="module">
      // Prefetch pages on link hover for instant navigation
      const seen = new Set();
      document.addEventListener('pointerover', (e) => {
        const a = e.target?.closest?.('a[href]');
        if (!a || seen.has(a.href) || a.href.startsWith('http') && !a.href.includes(location.host)) return;
        seen.add(a.href);
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = a.href;
        document.head.appendChild(link);
      }, { passive: true });
    </script>

    <style>
      /* Critical CSS inline - instant first paint */
      html { background: #07070f; }
      body { margin: 0; background: #07070f; color: #f2f2f2; font-family: Inter, system-ui, -apple-system, sans-serif; }
      #root { min-height: 100vh; }
      /* Instant loading spinner */
      .app-loader { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      .app-loader svg { width: 32px; height: 32px; animation: spin .6s linear infinite; color: #dc2626; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
